name: Bug report
description: Create a report to help us improve
title: "[Bug]: "
labels:
  - bug
assignees:
  - KodekaTeamOfficial

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to fill out this bug report.

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System
      options:
        - Ubuntu
        - Debian
        - CentOS
        - AlmaLinux
        - Rocky Linux
        - Fedora
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: e.g. Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome, Firefox, Safari

  - type: input
    id: doktainer-version
    attributes:
      label: Doktainer Version
      placeholder: e.g. v1.2.3
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.

  - type: checkboxes
    id: terms
    attributes:
      label: Before submitting
      options:
        - label: I have searched for existing issues before creating this report.
          required: true
        - label: I am using the latest available version of Doktainer.
          required: false