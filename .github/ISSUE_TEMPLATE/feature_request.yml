name: Feature request
description: Suggest an idea for this project
title: "[Feature]: "
labels:
  - enhancement
assignees:
  - KodekaTeamOfficial

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Doktainer.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: Describe the problem you're trying to solve.
      placeholder: |
        I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've considered.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or mockups here.

  - type: checkboxes
    id: terms
    attributes:
      label: Before submitting
      options:
        - label: I have searched for existing feature requests before creating this issue.
          required: true